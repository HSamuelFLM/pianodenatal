<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Christmas Piano</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a2e1a 0%, #1a472a 50%, #2d5a3b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 900px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .profile-header {
            background: linear-gradient(135deg, #c41e3a 0%, #8b1528 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 4px solid #ffd700;
        }
        
        .profile-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .profile-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .profile-content {
            padding: 40px;
        }
        
        .info-card {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        
        .info-card:hover {
            transform: translateX(5px);
        }
        
        .info-label {
            font-weight: 600;
            color: #c41e3a;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-value {
            font-size: 20px;
            color: #333;
            font-weight: 500;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #c41e3a;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            flex: 1;
            padding: 14px 30px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2e5c3e 0%, #1a472a 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 92, 62, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #c41e3a 0%, #8b1528 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        @media (max-width: 768px) {
            .dashboard-container {
                margin: 20px;
            }
            .profile-content {
                padding: 25px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="profile-header">
            <div class="profile-avatar" id="avatarIcon">🎄</div>
            <h2 id="userName">Carregando...</h2>
            <p id="userEmail"></p>
        </div>
        
        <div class="profile-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="memberSince">-</div>
                    <div class="stat-label">Membro desde</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="songsPlayed">0</div>
                    <div class="stat-label">Músicas ouvidas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="favoriteSong">-</div>
                    <div class="stat-label">Música favorita</div>
                </div>
            </div>
            
            <div class="info-card">
                <div class="info-label">📧 E-mail</div>
                <div class="info-value" id="displayEmail">-</div>
            </div>
            
            <div class="info-card">
                <div class="info-label">🎵 Status</div>
                <div class="info-value" id="userStatus">Premium Player 🎄</div>
            </div>
            
            <div class="button-group">
                <a href="index.html" class="btn btn-primary">🎹 Voltar ao Piano</a>
                <button onclick="logout()" class="btn btn-danger">🚪 Sair da Conta</button>
            </div>
        </div>
    </div>
    
    <script>
        // Verificar se está logado
        const loggedUser = localStorage.getItem('loggedUser');
        if (!loggedUser) {
            window.location.href = 'login.html';
        }
        
        // Carregar dados do usuário
        const user = JSON.parse(loggedUser);
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('displayEmail').textContent = user.email;
        
        // Iniciais para o avatar
        const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        document.getElementById('avatarIcon').textContent = initials;
        
        // Carregar estatísticas
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const userData = users.find(u => u.id === user.id);
        
        if (userData && userData.registerDate) {
            const date = new Date(userData.registerDate);
            document.getElementById('memberSince').textContent = date.toLocaleDateString('pt-BR');
        } else {
            document.getElementById('memberSince').textContent = 'Dezembro 2025';
        }
        
        // Músicas ouvidas
        let plays = localStorage.getItem(`plays_${user.id}`) || 0;
        document.getElementById('songsPlayed').textContent = plays;
        
        // Música favorita
        const songPlays = JSON.parse(localStorage.getItem(`songPlays_${user.id}`) || '{}');
        let favorite = '-';
        let maxPlays = 0;
        for (let [song, count] of Object.entries(songPlays)) {
            if (count > maxPlays) {
                maxPlays = count;
                favorite = song;
            }
        }
        document.getElementById('favoriteSong').textContent = favorite !== '-' ? favorite : 'Nenhuma ainda';
        
        function logout() {
            localStorage.removeItem('loggedUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
